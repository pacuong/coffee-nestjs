version: '3.8'

services:
  mysql:
    image: mysql:8

    container_name: coffee_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coffee_db

    ports:
      - '3307:3306'

    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine

    container_name: coffee_redis

    restart: always

    ports:
      - '6380:6379'

    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
